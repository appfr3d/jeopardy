<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jeopardy Board</title>
    <script>
      const pathSegmentsToKeep = 1;
      const pathnameSegments = window.location.pathname
        .split("/")
        .filter(Boolean);
      const baseSegments = pathnameSegments.slice(0, pathSegmentsToKeep);
      const boardSegments = pathnameSegments.slice(pathSegmentsToKeep);
      const basePath = `/${baseSegments.join("/")}`;
      const boardPath = `/${boardSegments.join("/")}`;
      const redirectUrl = `${basePath}/?boardPath=${encodeURIComponent(boardPath || "/")}${window.location.hash}`;

      window.location.replace(redirectUrl);
    </script>
  </head>
  <body></body>
</html>
